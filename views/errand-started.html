<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errand Started</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">

  <div style="max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden;">

    <div style="background:#d97706;color:#fff;padding:30px;text-align:center;">
      <h2 style="margin:0 0 8px;">{{appName}}</h2>
      <p style="margin:0;font-size:15px;">Errand In Progress</p>
    </div>

    <div style="padding:30px;">
      <p>Hello {{firstName}},</p>

      <p>Your errand <strong>"{{errandTitle}}"</strong> is now in progress. The runner has started working on it.</p>

      <div style="text-align:center;margin:30px 0;">
        <a href="{{clientUrl}}/user/my-errands"
           style="background:#d97706;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block;">
          View Errand
        </a>
      </div>

      <p>You'll be notified when the runner marks it as complete.</p>

      <p>— The {{appName}} Team <a href="mailto:support@campusbaze.com">support@campusbaze.com</a></p>
    </div>

  </div>

</body>
</html>

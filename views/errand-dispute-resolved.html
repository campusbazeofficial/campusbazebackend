<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispute Resolved</title>
</head>
<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif;">

  <div style="max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden;">

    <div style="background:#2f855a;color:#fff;padding:30px;text-align:center;">
      <h2 style="margin:0 0 8px;">{{appName}}</h2>
      <p style="margin:0;font-size:15px;">Dispute Resolved</p>
    </div>

    <div style="padding:30px;">
      <p>Hello {{firstName}},</p>

      <p>The dispute for the errand <strong>"{{errandTitle}}"</strong> has been resolved.</p>

      <div style="background:#f0fff4;border-left:4px solid #2f855a;padding:14px 18px;border-radius:4px;margin:20px 0;">
        <p style="margin:0;font-weight:bold;">{{result}}</p>
      </div>

      <div style="text-align:center;margin:30px 0;">
        <a href="{{clientUrl}}/user/my-errands"
           style="background:#2f855a;color:#fff;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block;">
          View Errand
        </a>
      </div>

      <p style="color:#888;font-size:13px;">If you have questions about this outcome, please contact our support team.<a href="mailto:support@campusbaze.com">support@campusbaze.com</a></p>

      <p>— The {{appName}} Team</p>
    </div>

  </div>

</body>
</html>
